services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scalora
      POSTGRES_USER: scalora
      POSTGRES_PASSWORD: change-me
    ports: ["5432:5432"]
    volumes: ["scalora-postgres:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scalora"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  scalora-postgres:
